<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- background tile -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#0A0A0B"/>
  <rect x="3" y="3" width="94" height="94" rx="19" fill="none" stroke="#2C2C30" stroke-width="2"/>

  <!-- monogram A, drawn as three strokes so it stays crisp at 16px -->
  <g fill="none" stroke="#2FB350" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 78 L50 24 L70 78"/>
    <path d="M39 58 L61 58"/>
  </g>

  <!-- silver baseline accent -->
  <rect x="26" y="83" width="48" height="4" rx="2" fill="#C7C9D1" opacity="0.55"/>

  <!-- maroon status accent, top-right corner -->
  <circle cx="79" cy="21" r="7" fill="#8C2036"/>
  <circle cx="79" cy="21" r="7" fill="none" stroke="#C2455F" stroke-width="1.5"/>
</svg>
